version: "3.9"

# ============================================================
# CapiSolutions CRM — Docker Compose
# Serviços: Next.js, Nginx, n8n, Evolution API
# Supabase: gerenciado via cloud (supabase.com) ou self-hosted
# ============================================================

services:

  # ============================================================
  # NEXT.JS — Aplicação Web
  # ============================================================
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    container_name: capisolutions-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    ports:
      - "3000:3000"
    networks:
      - capisolutions-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - nginx

  # ============================================================
  # NGINX — Reverse Proxy + SSL
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: capisolutions-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - capisolutions-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # N8N — Automações e Workflows
  # ============================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: capisolutions-n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_HOST=n8n.${DOMAIN:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.${DOMAIN:-localhost}/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_LOG_LEVEL=warn
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${N8N_DB_HOST:-postgres-n8n}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${N8N_DB_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-n8npassword}
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - capisolutions-net
    depends_on:
      - postgres-n8n

  # ============================================================
  # POSTGRES para N8N (banco isolado)
  # ============================================================
  postgres-n8n:
    image: postgres:15-alpine
    container_name: capisolutions-postgres-n8n
    restart: unless-stopped
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=${N8N_DB_USER:-n8n}
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD:-n8npassword}
    volumes:
      - postgres-n8n-data:/var/lib/postgresql/data
    networks:
      - capisolutions-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # EVOLUTION API — WhatsApp Business
  # ============================================================
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: capisolutions-evolution
    restart: unless-stopped
    environment:
      - SERVER_URL=https://evolution.${DOMAIN:-localhost}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-changeme}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DEL_INSTANCE=false
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=${EVOLUTION_DB_URI:-mongodb://mongo:27017}
      - DATABASE_CONNECTION_DB_PREFIX_NAME=evolution
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${EVOLUTION_WEBHOOK_URL:-http://n8n:5678/webhook}
      - CONFIG_SESSION_PHONE_VERSION=2.2412.54
      - QRCODE_LIMIT=30
    ports:
      - "8080:8080"
    volumes:
      - evolution-instances:/evolution/instances
    networks:
      - capisolutions-net
    depends_on:
      - mongo

  # ============================================================
  # MONGODB para Evolution API
  # ============================================================
  mongo:
    image: mongo:6-jammy
    container_name: capisolutions-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-evolution}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-evolutionpass}
    volumes:
      - mongo-data:/data/db
    networks:
      - capisolutions-net

  # ============================================================
  # REDIS (cache + rate limiting)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: capisolutions-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis-data:/data
    networks:
      - capisolutions-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# ============================================================
# Volumes
# ============================================================
volumes:
  n8n-data:
  postgres-n8n-data:
  evolution-instances:
  mongo-data:
  redis-data:
  nginx-logs:

# ============================================================
# Redes
# ============================================================
networks:
  capisolutions-net:
    driver: bridge
